name: Build paper (LaTeX draft)

# Compiles the LaTeX draft (paper/paper.tex + joss.cls) and uploads paper.pdf as an
# artifact, so collaborators can preview the rendered paper without local LaTeX.
# (The official JOSS submission is Markdown — see paper/README.md.)

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/draft-paper.yml'
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile paper.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: paper.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
